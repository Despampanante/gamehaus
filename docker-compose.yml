services:
  gamehaus:
    build: .
    restart: unless-stopped
    ports:
      # Expose only to localhost — Caddy terminates TLS and proxies to this
      - "127.0.0.1:3000:3000"
    volumes:
      - ./games:/app/games:ro
      - gamehaus_db:/app/data
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/gamehaus.db
      - GAMES_DIR=/app/games
      # Headers that Caddy/PocketID forward after auth.
      # Match these to whatever your forward-auth provider sends.
      - AUTH_USER_HEADER=X-Forwarded-User
      - AUTH_EMAIL_HEADER=X-Forwarded-Email
      # Set OIDC_MODE=true and configure the four vars below only if you want
      # the backend to own the OIDC flow instead of relying on Caddy forward-auth.
      - OIDC_MODE=false
      #- OIDC_ISSUER=https://sso.example.com
      #- OIDC_CLIENT_ID=
      #- OIDC_CLIENT_SECRET=
      #- OIDC_REDIRECT_URI=https://gamehaus.example.com/api/auth/callback
    healthcheck:
      # Hits nginx → Bun, so both processes are verified in one check
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "com.gamehaus.service=gamehaus"

volumes:
  gamehaus_db:
