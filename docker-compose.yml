services:
  gamehaus:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"   # nginx (frontend)
      - "3001:3001"   # bun api (internal, remove in prod — route via caddy)
    volumes:
      - ./games:/app/games:ro
      - gamehaus_db:/app/data
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/gamehaus.db
      - GAMES_DIR=/app/games
      # Set to the header Caddy/PocketID forwards
      - AUTH_USER_HEADER=X-Forwarded-User
      - AUTH_EMAIL_HEADER=X-Forwarded-Email
      # Flip to true when wiring up OIDC callback flow.
      # Also set the four vars below — forward-auth vars are ignored in OIDC mode.
      - OIDC_MODE=false
      #- OIDC_ISSUER=https://sso.example.com
      #- OIDC_CLIENT_ID=
      #- OIDC_CLIENT_SECRET=
      #- OIDC_REDIRECT_URI=https://gamehaus.example.com/api/auth/callback
    labels:
      - "com.gamehaus.service=gamehaus"

volumes:
  gamehaus_db:
